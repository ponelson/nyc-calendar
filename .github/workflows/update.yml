name: Update calendar

on:
  schedule:
    - cron: "0 9 * * *"   # 05:00 ET, nightly
  workflow_dispatch:       # and whenever you press the button

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium
      - name: Scrape
        run: python -m scrape.main --out docs/data
      - name: Commit if changed
        run: |
          git config user.name  "nycal-bot"
          git config user.email "actions@github.com"
          git add docs/data/events.json docs/data/status.json
          git diff --staged --quiet || git commit -m "Calendar update $(date -u +%F)"
          git push
